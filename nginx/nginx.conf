# nginx/nginx.conf
# Unified reverse proxy:
#   /              → frontend static files (React SPA)
#   /api/*         → Express backend :3000
#   /health        → Express backend :3000
#   /metrics/*     → Express backend :3000
#   /test/*        → Express backend :3000
#   /docs          → Express backend :3000
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml application/xml
                       application/xml+rss text/javascript
                       application/vnd.ms-fontobject application/x-font-ttf
                       font/opentype image/svg+xml image/x-icon;
    gzip_min_length    1024;
    gzip_comp_level    5;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:3000;
        keepalive 16;
    }

    upstream frontend_app {
        server frontend:80;
        keepalive 8;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── ACME challenge (Let's Encrypt) ────────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Backend API routes ────────────────────────────────────────────────
        location ~ ^/(api|health|test|docs|demo)(/.*)?$ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout    30s;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
        }

        # ── Metrics/Stream (SSE — disable buffering!) ─────────────────────────
        location ~ ^/metrics(/.*)?$ {
            proxy_pass             http://api_backend;
            proxy_http_version     1.1;
            proxy_set_header       Host             $host;
            proxy_set_header       X-Real-IP        $remote_addr;
            proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
            # SSE requires no buffering — data must reach the browser immediately
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;  # Keep SSE connection alive for 1h
            add_header             X-Accel-Buffering no;
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
