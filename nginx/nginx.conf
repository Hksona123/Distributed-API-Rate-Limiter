# nginx.conf — UPGRADE 2: TLS Termination at the Reverse Proxy Layer
# ═══════════════════════════════════════════════════════════════════
#
# WHY TERMINATE TLS AT NGINX, NOT IN EXPRESS?
# ────────────────────────────────────────────
# 1. PERFORMANCE: Nginx handles TLS handshakes in optimized C code.
#    Node.js handles them in a single-threaded event loop — at 10k RPS,
#    TLS overhead in Node can consume 20-30% of CPU on handshakes alone.
#
# 2. CERT ROTATION: Nginx reloads config (nginx -s reload) without
#    dropping connections. Rotating a cert in Express requires a full
#    process restart (all in-flight requests die).
#
# 3. SEPARATION OF CONCERNS: Express only handles business logic.
#    nginx handles: TLS, HTTP→HTTPS redirect, connection limiting,
#    gzip compression, static file serving — all at C speed.
#
# 4. DEFENSE IN DEPTH: nginx can drop connections from known-bad IPs
#    before the payload ever reaches Node.js.
#
# HOW TO GENERATE LOCAL SELF-SIGNED CERT:
# ─────────────────────────────────────────
#   mkdir -p nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/server.key \
#     -out nginx/certs/server.crt \
#     -subj "/C=US/ST=Dev/L=Local/O=RateLimiter/CN=localhost"
#
# FOR PRODUCTION: Replace with Let's Encrypt certs via Certbot or
# mount real certs from a secret manager (Vault, AWS Secrets Manager).

worker_processes auto;

events {
    worker_connections 4096;  # Handles 4k simultaneous connections per worker
    use epoll;                # Linux epoll — most efficient I/O model
}

http {
    # ── Security headers applied to all responses ──────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── HTTP → HTTPS redirect (80 → 443) ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge passthrough for Let's Encrypt cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;

        # ── TLS configuration ─────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Modern TLS — disable TLS 1.0/1.1 (PCI-DSS requirement)
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;

        # Session resumption — saves a full TLS handshake on repeat clients
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP stapling — faster cert validation (server fetches, client trusts)
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Proxy to Express (unencrypted — internal Docker network only) ──
        location / {
            proxy_pass         http://api:3000;
            proxy_http_version 1.1;

            # WebSocket support (future-proof)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Forward real client IP so rate limiter keys on actual IP, not nginx IP
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Host             $host;

            # Timeouts — prevent slowloris attacks
            proxy_read_timeout    30s;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;

            # Buffer settings — prevent head-of-line blocking
            proxy_buffer_size          4k;
            proxy_buffers              8 8k;
            proxy_busy_buffers_size    16k;
        }

        # ── /metrics — restrict to Prometheus scraper only ─────────────────
        # In production, replace with real Prometheus pod CIDR
        location /metrics {
            allow 172.16.0.0/12;  # Docker network range
            allow 10.0.0.0/8;     # K8s pod CIDR
            deny  all;

            proxy_pass http://api:3000/metrics;
        }
    }
}
