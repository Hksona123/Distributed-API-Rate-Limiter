# k8s/service.yaml — ClusterIP Service
# ══════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: rate-limiter-api
  namespace: rate-limiter
  labels:
    app: rate-limiter-api
spec:
  type: ClusterIP  # Internal only — nginx Ingress is the public entry point
  selector:
    app: rate-limiter-api
  ports:
    - name:       http
      protocol:   TCP
      port:       3000
      targetPort: 3000

---
# k8s/configmap.yaml — Non-secret environment variables
# ══════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limiter-config
  namespace: rate-limiter
data:
  PORT:           "3000"
  FAIL_OPEN:      "true"
  RATE_LIMIT_MAX: "100"
  WINDOW_MS:      "60000"

---
# k8s/secret.yaml — Sensitive credentials (base64-encoded in real clusters)
# ══════════════════════════════════════════════════════════════════════════
# IMPORTANT: In real production, use External Secrets Operator or Vault Agent
# to inject secrets from AWS Secrets Manager / HashiCorp Vault.
# NEVER commit real secrets to Git — this file shows the schema only.
#
# To create from real values:
#   kubectl create secret generic rate-limiter-secrets \
#     --from-literal=REDIS_CLUSTER_NODES="redis-0:7001,redis-1:7002,redis-2:7003" \
#     --from-literal=REDIS_PASSWORD="your-password-here" \
#     -n rate-limiter
apiVersion: v1
kind: Secret
metadata:
  name: rate-limiter-secrets
  namespace: rate-limiter
type: Opaque
stringData:  # stringData auto-base64-encodes (kubectl apply only)
  REDIS_CLUSTER_NODES: "redis-0.redis-cluster.rate-limiter.svc.cluster.local:7001,redis-1.redis-cluster.rate-limiter.svc.cluster.local:7002,redis-2.redis-cluster.rate-limiter.svc.cluster.local:7003"
  REDIS_PASSWORD:      "REPLACE_WITH_REAL_PASSWORD"

---
# k8s/namespace.yaml — Isolate all resources in a dedicated namespace
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: rate-limiter
  labels:
    name: rate-limiter
