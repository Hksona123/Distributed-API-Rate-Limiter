# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Distributed High-Throughput API Rate Limiter — Production Stack
#
# Services:
#   redis    — Redis 7 standalone (use docker-compose.cluster.yml for cluster)
#   api      — Express + TypeScript backend
#   frontend — React SPA built with Vite, served by Nginx
#   proxy    — Nginx reverse proxy (unifies port 80)
#
# Usage:
#   Start:   docker compose up -d --build
#   Logs:    docker compose logs -f
#   Stop:    docker compose down
#   Rebuild: docker compose up -d --build --force-recreate
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── Redis (standalone, single node) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - rl-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Express / TypeScript API ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rl-api
    restart: unless-stopped
    environment:
      NODE_ENV:    production
      PORT:        "3000"
      REDIS_URL:   redis://redis:6379
      FAIL_OPEN:   "true"
      RATE_LIMIT_MAX: "100"
      WINDOW_MS:   "60000"
    expose:
      - "3000"
    networks:
      - rl-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── React SPA (built by Vite, served by Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rl-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - rl-net
    depends_on:
      - api

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: rl-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rl-net
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  rl-net:
    driver: bridge

volumes:
  redis-data:
